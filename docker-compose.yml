services:
  mysql:
    image: mysql:8.0
    container_name: mobiledev-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mobiledev_portal
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Kolkata
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./current_sql_dump:/docker-entrypoint-initdb.d

  flutter-runner:
    build:
      context: ./backend
      dockerfile: flutter_runner/Dockerfile
    image: flutter-runner:latest

  backend:
    build:
      context: ./backend
    container_name: mobiledev-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - flutter-runner
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: mobiledev_portal
      TZ: Asia/Kolkata
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      JWT_COOKIE_MAX_AGE_MS: ${JWT_COOKIE_MAX_AGE_MS}
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
      FRONTEND_URLS: ${FRONTEND_URLS}
      RESET_SESSION_SECRET: ${RESET_SESSION_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
    ports:
      - "5000:5000"  # Backend: internal only (accessed by nginx)
    volumes:
      - ./backend/uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ./frontend/frontend
      args:
        VITE_API_BASE: auto
        VITE_API_ORIGIN: auto
    container_name: mobiledev-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"  # Frontend: change to 443:443 when using HTTPS

volumes:
  mysql_data:
